<?xml version="1.0" encoding="UTF-8"?>
<svg width="1400" height="820" viewBox="0 0 1400 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Ablauf: Note erstellen im Fretboard-Editor">
  <defs>
    <style>
      .bg { fill: #0b1220; }
      .panel { fill: #111a2e; stroke: rgba(255,255,255,0.12); stroke-width: 1; }
      .title { fill: rgba(255,255,255,0.92); font: 700 22px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .subtitle { fill: rgba(255,255,255,0.70); font: 500 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .group { fill: rgba(255,255,255,0.75); font: 700 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; letter-spacing: 0.4px; }
      .node { fill: #0f2547; stroke: rgba(255,255,255,0.18); stroke-width: 1; rx: 14; }
      .node2 { fill: #14345f; stroke: rgba(255,255,255,0.18); stroke-width: 1; rx: 14; }
      .node3 { fill: #1a2b4a; stroke: rgba(255,255,255,0.18); stroke-width: 1; rx: 14; }
      .label { fill: rgba(255,255,255,0.92); font: 700 14px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .text { fill: rgba(255,255,255,0.72); font: 500 12.5px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .mono { fill: rgba(255,255,255,0.82); font: 600 12px ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .arrow { stroke: rgba(255,255,255,0.70); stroke-width: 2.2; fill: none; }
      .arrowSoft { stroke: rgba(125,211,252,0.85); stroke-width: 2.2; fill: none; }
      .arrowWarn { stroke: rgba(253,186,116,0.90); stroke-width: 2.2; fill: none; }
      .note { fill: rgba(255,255,255,0.60); font: 500 12px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; }
      .pill { fill: rgba(255,255,255,0.08); stroke: rgba(255,255,255,0.12); stroke-width: 1; rx: 999; }
      .pillText { fill: rgba(255,255,255,0.80); font: 700 11px ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial; letter-spacing: 0.3px; }
    </style>

    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="rgba(255,255,255,0.70)" />
    </marker>
    <marker id="arrowHeadSoft" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="rgba(125,211,252,0.85)" />
    </marker>
    <marker id="arrowHeadWarn" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L10,3 L0,6 Z" fill="rgba(253,186,116,0.90)" />
    </marker>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- background -->
  <rect class="bg" x="0" y="0" width="1400" height="820" />

  <!-- header -->
  <g>
    <text class="title" x="44" y="60">Fretboard-Editor: Note erstellen (Click → Note-Objekt → Dot sichtbar)</text>
    <text class="subtitle" x="44" y="86">Quelle: FretPosition → StringTrack → FretboardEdit → NotesStore (Pinia)</text>
  </g>

  <!-- panels -->
  <rect class="panel" x="36" y="120" width="640" height="650" rx="18" filter="url(#shadow)" />
  <rect class="panel" x="724" y="120" width="640" height="650" rx="18" filter="url(#shadow)" />

  <text class="group" x="60" y="156">UI / Komponenten</text>
  <text class="group" x="748" y="156">Stores / Domain</text>

  <!-- UI nodes -->
  <g>
    <rect class="node" x="60" y="186" width="590" height="98" />
    <text class="label" x="86" y="220">1) Click auf Zelle</text>
    <text class="mono" x="86" y="246">FretPosition.vue</text>
    <text class="text" x="86" y="270">@click → emit(&quot;toggle&quot;)</text>
    <rect class="pill" x="510" y="208" width="120" height="24" />
    <text class="pillText" x="522" y="225">toggle</text>
  </g>

  <g>
    <rect class="node" x="60" y="308" width="590" height="122" />
    <text class="label" x="86" y="342">2) Key erzeugen und hoch-emittieren</text>
    <text class="mono" x="86" y="368">StringTrack.vue</text>
    <text class="text" x="86" y="392">emitToggleNote(fret) → emit(&quot;toggle-note&quot;, `${fret}-${stringNumber}`)</text>
    <rect class="pill" x="456" y="330" width="174" height="24" />
    <text class="pillText" x="468" y="347">toggle-note</text>
  </g>

  <g>
    <rect class="node2" x="60" y="454" width="590" height="138" />
    <text class="label" x="86" y="488">3) Parent verarbeitet Click</text>
    <text class="mono" x="86" y="514">FretboardEdit.vue</text>
    <text class="text" x="86" y="538">@toggle-note=&quot;toggleNote&quot;</text>
    <text class="text" x="86" y="562">toggleNote(key) → store.addNote(key)</text>
    <rect class="pill" x="470" y="474" width="160" height="24" />
    <text class="pillText" x="482" y="491">addNote(key)</text>
  </g>

  <g>
    <rect class="node3" x="60" y="616" width="590" height="128" />
    <text class="label" x="86" y="650">4) UI aktualisiert</text>
    <text class="text" x="86" y="674">activeNotes reactive → isFretActive(fret,string) wird true</text>
    <text class="text" x="86" y="698">FretPosition bekommt Klasse &quot;active&quot; → Dot sichtbar</text>
  </g>

  <!-- Store nodes -->
  <g>
    <rect class="node2" x="748" y="186" width="590" height="168" />
    <text class="label" x="774" y="220">5) Note wird gebaut</text>
    <text class="mono" x="774" y="246">useNotes.js → createNoteFromKey(key)</text>
    <text class="text" x="774" y="270">parseFretStringKey(&quot;fret-string&quot;) → { fret, string }</text>
    <text class="text" x="774" y="294">gridIndex: append ODER playheadMs → idx</text>
    <text class="text" x="774" y="318">lengthBlocks: aus selectedMode / lastRhythmMode</text>
  </g>

  <g>
    <rect class="node" x="748" y="378" width="590" height="132" />
    <text class="label" x="774" y="412">6) Note-Objekt</text>
    <text class="text" x="774" y="438">{ key: UUID, fret, string, color, gridIndex, lengthBlocks, placedAtMs }</text>
    <text class="mono" x="774" y="462">domain/note.js → createNoteKey()</text>
    <text class="note" x="774" y="486">Hinweis: note.key ≠ &quot;3-1&quot; (UI-Key). note.key ist eine eigene ID.</text>
  </g>

  <g>
    <rect class="node" x="748" y="534" width="590" height="98" />
    <text class="label" x="774" y="568">7) Store-State</text>
    <text class="mono" x="774" y="594">addNote(key) → activeNotes.push(note)</text>
  </g>

  <g>
    <rect class="node3" x="748" y="656" width="590" height="88" />
    <text class="label" x="774" y="690">8) Re-render / Dot sichtbar</text>
    <text class="text" x="774" y="714">Komponenten lesen activeNotes → .active wird gesetzt</text>
  </g>

  <!-- arrows UI flow -->
  <path class="arrow" d="M355 284 L355 308" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M355 430 L355 454" marker-end="url(#arrowHead)" />
  <path class="arrow" d="M355 592 L355 616" marker-end="url(#arrowHead)" />

  <!-- cross arrows to stores -->
  <path class="arrowSoft" d="M650 520 C760 520 650 270 748 270" marker-end="url(#arrowHeadSoft)" />
  <path class="arrowSoft" d="M1043 354 L1043 378" marker-end="url(#arrowHeadSoft)" />
  <path class="arrowSoft" d="M1043 510 L1043 534" marker-end="url(#arrowHeadSoft)" />
  <path class="arrowSoft" d="M1043 632 L1043 656" marker-end="url(#arrowHeadSoft)" />

  <!-- back to UI -->
  <path class="arrowSoft" d="M748 700 C650 700 740 682 650 682" marker-end="url(#arrowHeadSoft)" />

  <!-- optional audio preview branch -->
  <g>
    <rect class="panel" x="60" y="106" width="355" height="56" rx="14" />
    <text class="group" x="82" y="140">Optional: Sound Preview</text>
  </g>
  <path class="arrowWarn" d="M470 522 C520 522 520 130 420 130" marker-end="url(#arrowHeadWarn)" />
  <text class="note" x="190" y="152">FretboardEdit.toggleNote: playMidi(...), wenn enabled</text>

  <!-- footer -->
  <text class="note" x="44" y="798">Datei: docs/note-creation-flow.svg — öffne sie direkt in VS Code (Preview) oder im Browser.</text>
</svg>
